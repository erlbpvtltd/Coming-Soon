<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0CC6A;
    --gold-dark: #8B6914;
    --black: #0A0A0A;
    --deep: #111008;
    --smoke: #1a1810;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* Radial glow background */
  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(201,168,76,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 100% 80% at 50% 100%, rgba(139,105,20,0.12) 0%, transparent 60%),
      var(--deep);
    z-index: 0;
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--gold);
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
  }

  /* Decorative lines */
  .deco-line {
    position: fixed;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
    height: 1px;
    width: 100%;
    animation: scanLine 8s ease-in-out infinite;
  }
  .deco-line:nth-child(1) { top: 20%; animation-delay: 0s; }
  .deco-line:nth-child(2) { top: 80%; animation-delay: 4s; }

  @keyframes scanLine {
    0%, 100% { opacity: 0; transform: scaleX(0); }
    50% { opacity: 1; transform: scaleX(1); }
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    max-width: 900px;
    width: 100%;
  }

  /* Logo */
  .logo-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 2rem;
    animation: logoEntrance 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  @keyframes logoEntrance {
    0% { opacity: 0; transform: translateY(-40px) scale(0.8); filter: blur(20px); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  .logo-wrap img {
    width: 180px;
    height: 180px;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(201,168,76,0.5)) drop-shadow(0 0 60px rgba(201,168,76,0.2));
    animation: logoFloat 6s ease-in-out infinite, logoGlow 3s ease-in-out infinite alternate;
  }

  @keyframes logoFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
  }

  @keyframes logoGlow {
    0% { filter: drop-shadow(0 0 20px rgba(201,168,76,0.4)) drop-shadow(0 0 40px rgba(201,168,76,0.15)); }
    100% { filter: drop-shadow(0 0 40px rgba(201,168,76,0.8)) drop-shadow(0 0 80px rgba(201,168,76,0.35)); }
  }

  /* Ornamental divider */
  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 1.2rem 0;
    animation: fadeSlideUp 1s ease forwards;
    opacity: 0;
    animation-delay: 0.4s;
  }

  .ornament-line {
    flex: 1;
    max-width: 160px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .ornament-diamond {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 10px var(--gold);
  }

  .ornament-dot {
    width: 4px;
    height: 4px;
    background: var(--gold-light);
    border-radius: 50%;
  }

  /* Heading */
  .heading {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2.2rem, 6vw, 5rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold-light) 40%, #fff8e0 55%, var(--gold-light) 70%, var(--gold-dark) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200% auto;
    animation: shimmerText 4s linear infinite, fadeSlideUp 1s ease forwards;
    opacity: 0;
    animation-delay: 0.6s, 0.6s;
    text-shadow: none;
  }

  @keyframes shimmerText {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .subheading {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(240,204,106,0.7);
    margin-top: 0.5rem;
    animation: fadeSlideUp 1s ease forwards;
    opacity: 0;
    animation-delay: 0.9s;
  }

  /* Coming Soon text */
  .coming-soon-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(0.75rem, 2vw, 1.1rem);
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    margin: 0.5rem 0 1.5rem;
    animation: fadeSlideUp 1s ease forwards, pulse 3s ease-in-out infinite;
    opacity: 0;
    animation-delay: 1.1s, 2s;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  @keyframes fadeSlideUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Countdown */
  .countdown {
    display: flex;
    justify-content: center;
    gap: clamp(12px, 3vw, 36px);
    margin: 2rem 0;
    animation: fadeSlideUp 1s ease forwards;
    opacity: 0;
    animation-delay: 1.3s;
  }

  .time-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .time-number {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 700;
    line-height: 1;
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.5);
    position: relative;
    min-width: clamp(60px, 10vw, 110px);
    text-align: center;
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 12px 8px 8px;
    border-radius: 4px;
    transition: all 0.3s;
  }

  .time-number::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(201,168,76,0.1) 0%, transparent 50%);
    border-radius: 4px;
    pointer-events: none;
  }

  .time-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.55rem, 1.2vw, 0.75rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.5);
  }

  .time-separator {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--gold);
    align-self: flex-start;
    padding-top: 8px;
    animation: blinkSep 1s step-end infinite;
    opacity: 0.6;
  }

  @keyframes blinkSep { 0%, 100% { opacity: 0.6; } 50% { opacity: 0; } }

  /* Email form */
  .notify-wrap {
    margin-top: 2rem;
    animation: fadeSlideUp 1s ease forwards;
    opacity: 0;
    animation-delay: 1.6s;
  }

  .notify-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: rgba(240,204,106,0.6);
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
  }

  .notify-form {
    display: flex;
    justify-content: center;
    gap: 0;
    max-width: 440px;
    margin: 0 auto;
  }

  .notify-input {
    flex: 1;
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.3);
    border-right: none;
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    padding: 12px 18px;
    outline: none;
    letter-spacing: 0.05em;
    transition: border-color 0.3s, background 0.3s;
    border-radius: 3px 0 0 3px;
  }

  .notify-input::placeholder { color: rgba(201,168,76,0.3); }
  .notify-input:focus {
    border-color: rgba(201,168,76,0.7);
    background: rgba(201,168,76,0.08);
  }

  .notify-btn {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
    background-size: 200% auto;
    border: none;
    color: var(--black);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 12px 22px;
    cursor: pointer;
    transition: background-position 0.4s, transform 0.2s, box-shadow 0.3s;
    border-radius: 0 3px 3px 0;
    text-transform: uppercase;
  }

  .notify-btn:hover {
    background-position: right center;
    box-shadow: 0 0 25px rgba(201,168,76,0.5);
    transform: translateY(-1px);
  }

  .notify-btn:active { transform: translateY(0); }

  /* Social links / bottom bar */
  .bottom-bar {
    margin-top: 2.5rem;
    animation: fadeSlideUp 1s ease forwards;
    opacity: 0;
    animation-delay: 1.9s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 1.8vw, 1rem);
    color: rgba(201,168,76,0.45);
    letter-spacing: 0.2em;
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 60px;
    height: 60px;
    opacity: 0.35;
    animation: fadeIn 2s ease 2s forwards;
    opacity: 0;
  }

  @keyframes fadeIn { to { opacity: 0.35; } }

  .corner svg { width: 100%; height: 100%; }
  .corner--tl { top: 24px; left: 24px; }
  .corner--tr { top: 24px; right: 24px; transform: scaleX(-1); }
  .corner--bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
  .corner--br { bottom: 24px; right: 24px; transform: scale(-1); }

  /* Success msg */
  .success-msg {
    display: none;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--gold-light);
    font-size: 1.05rem;
    letter-spacing: 0.1em;
    margin-top: 10px;
    animation: fadeSlideUp 0.5s ease forwards;
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="particles" id="particles"></div>

<div class="deco-line"></div>
<div class="deco-line"></div>

<!-- Corner ornaments -->
<div class="corner corner--tl">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 58 L2 2 L58 2" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <path d="M2 30 L20 2" stroke="#C9A84C" stroke-width="0.8" fill="none" opacity="0.5"/>
    <circle cx="2" cy="2" r="3" fill="#C9A84C"/>
  </svg>
</div>
<div class="corner corner--tr">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 58 L2 2 L58 2" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <path d="M2 30 L20 2" stroke="#C9A84C" stroke-width="0.8" fill="none" opacity="0.5"/>
    <circle cx="2" cy="2" r="3" fill="#C9A84C"/>
  </svg>
</div>
<div class="corner corner--bl">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 58 L2 2 L58 2" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <path d="M2 30 L20 2" stroke="#C9A84C" stroke-width="0.8" fill="none" opacity="0.5"/>
    <circle cx="2" cy="2" r="3" fill="#C9A84C"/>
  </svg>
</div>
<div class="corner corner--br">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 58 L2 2 L58 2" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <path d="M2 30 L20 2" stroke="#C9A84C" stroke-width="0.8" fill="none" opacity="0.5"/>
    <circle cx="2" cy="2" r="3" fill="#C9A84C"/>
  </svg>
</div>

<div class="container">
  <!-- Logo -->
  <div class="logo-wrap">
    <img src="/mnt/user-data/uploads/1775638404795_favicon.jpeg" alt="Logo">
  </div>

  <!-- Ornament -->
  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-dot"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-dot"></div>
    <div class="ornament-line"></div>
  </div>

  <h1 class="heading">Coming Soon</h1>
  <p class="subheading">Something extraordinary awaits</p>

  <div class="ornament" style="animation-delay:1s">
    <div class="ornament-line"></div>
    <div class="ornament-dot"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-dot"></div>
    <div class="ornament-line"></div>
  </div>

  <p class="coming-soon-text">We are going live</p>

  <!-- Countdown -->
  <div class="countdown">
    <div class="time-block">
      <div class="time-number" id="days">00</div>
      <div class="time-label">Days</div>
    </div>
    <div class="time-separator">:</div>
    <div class="time-block">
      <div class="time-number" id="hours">00</div>
      <div class="time-label">Hours</div>
    </div>
    <div class="time-separator">:</div>
    <div class="time-block">
      <div class="time-number" id="minutes">00</div>
      <div class="time-label">Minutes</div>
    </div>
    <div class="time-separator">:</div>
    <div class="time-block">
      <div class="time-number" id="seconds">00</div>
      <div class="time-label">Seconds</div>
    </div>
  </div>

  <!-- Notify -->
  <div class="notify-wrap">
    <p class="notify-label">Be the first to know when we launch</p>
    <div class="notify-form">
      <input class="notify-input" type="email" id="emailInput" placeholder="Your email address…">
      <button class="notify-btn" onclick="handleNotify()">Notify Me</button>
    </div>
    <div class="success-msg" id="successMsg">✦ &nbsp;Thank you — we'll notify you on launch day &nbsp;✦</div>
  </div>

  <div class="bottom-bar">
    <p class="tagline">— crafted with excellence, built for you —</p>
  </div>
</div>

<script>
  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${Math.random() * 3 + 1}px;
      height: ${Math.random() * 3 + 1}px;
      animation-duration: ${Math.random() * 15 + 8}s;
      animation-delay: ${Math.random() * 10}s;
      --drift: ${(Math.random() - 0.5) * 100}px;
    `;
    container.appendChild(p);
  }

  // Countdown — target: 30 days from now
  const target = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);

  function updateCountdown() {
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) {
      document.getElementById('days').textContent = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('minutes').textContent = '00';
      document.getElementById('seconds').textContent = '00';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('days').textContent = String(d).padStart(2,'0');
    document.getElementById('hours').textContent = String(h).padStart(2,'0');
    document.getElementById('minutes').textContent = String(m).padStart(2,'0');
    document.getElementById('seconds').textContent = String(s).padStart(2,'0');
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);

  // Notify
  function handleNotify() {
    const email = document.getElementById('emailInput').value;
    if (!email || !email.includes('@')) {
      document.getElementById('emailInput').style.borderColor = 'rgba(255,100,100,0.6)';
      setTimeout(() => document.getElementById('emailInput').style.borderColor = '', 1500);
      return;
    }
    document.querySelector('.notify-form').style.display = 'none';
    const msg = document.getElementById('successMsg');
    msg.style.display = 'block';
  }
</script>
</body>
</html>
